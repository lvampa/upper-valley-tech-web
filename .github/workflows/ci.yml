name: CI

on:
  pull_request:

# Checks are read-only; no repo write access needed.
permissions:
  contents: read

# Cancel superseded runs when a PR gets new commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # Tests only need a valid URL for env validation (t3-env); not a real API.
      VITE_EVENTS_API_URL: https://api.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
