name: CI

on:
  pull_request:
  push:
    branches: [production]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # Tests only need a valid URL for env validation (t3-env); not a real API.
      VITE_EVENTS_API_URL: https://api.test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    env:
      # Baked into the production build (not a committed .env file).
      VITE_EVENTS_API_URL: https://api.uppervalleytech.org
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=uppervalley-tech --branch=production
